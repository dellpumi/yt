<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Unblocked Proxy Viewer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #1e1e24; color: #fff; }
        .container { max-width: 800px; margin: auto; }
        h1 { text-align: center; color: #00d2ff; margin-bottom: 5px; }
        
        /* Video Player Dropdown Styling */
        #settings-container { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 15px; }
        #settings-container label { font-size: 14px; margin-right: 10px; color: #aaa; }
        #player-select { padding: 8px 12px; border-radius: 5px; background: #2b2b36; color: #00d2ff; border: 1px solid #444; font-size: 14px; cursor: pointer; outline: none; max-width: 280px; }
        #player-select:focus { border-color: #00d2ff; }

        #search-container { display: flex; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #search-input { flex-grow: 1; padding: 15px; font-size: 16px; border: none; border-radius: 5px 0 0 5px; background: #2b2b36; color: white; }
        #search-input:focus { outline: none; }
        #search-btn { padding: 15px 25px; font-size: 16px; cursor: pointer; border: none; background-color: #00d2ff; color: #1e1e24; border-radius: 0 5px 5px 0; font-weight: bold; transition: background 0.2s; }
        #search-btn:hover { background-color: #00a8cc; }
        
        #player-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; margin-bottom: 20px; display: none; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .result-item { display: flex; margin-bottom: 15px; cursor: pointer; background: #2b2b36; padding: 10px; border-radius: 8px; transition: transform 0.2s, background 0.2s; }
        .result-item:hover { transform: scale(1.02); background: #353542; }
        .result-item img { width: 160px; height: 90px; object-fit: cover; margin-right: 15px; border-radius: 4px; background: #111; }
        .result-item-content h3 { margin: 0 0 5px 0; font-size: 16px; }
        .result-item-content p { margin: 0; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unblocked Video Viewer</h1>
        
        <!-- The dropdown is now ONLY for the Video Player -->
        <div id="settings-container">
            <label for="player-select">Video Player Server:</label>
            <select id="player-select">
                <option value="https://inv.tux.pizza">inv.tux.pizza (Europe - Fast)</option>
                <option value="https://invidious.nerdvpn.de">invidious.nerdvpn.de (Europe)</option>
                <option value="https://invidious.flokinet.to">invidious.flokinet.to (Europe)</option>
                <option value="https://yt.artemislena.eu">yt.artemislena.eu (Europe)</option>
                <option value="https://vid.puffyan.us">vid.puffyan.us (US / Global)</option>
                <option value="https://yewtu.be">yewtu.be (Global)</option>
            </select>
        </div>
        
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search for videos...">
            <button id="search-btn">Search</button>
        </div>
        
        <div id="player-container">
            <iframe id="video-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div id="results"></div>
    </div>

    <script>
        // These are headless Piped APIs. They are built for developers. 
        // No CORS errors, No Cloudflare Bot Checks!
        const searchApis =[
            "https://pipedapi.kavin.rocks",
            "https://pipedapi.lunar.icu",
            "https://pipedapi.smnz.de",
            "https://piped-api.garudalinux.org"
        ];

        // Helper to get the Video Player choice
        function getPlayerUrl() {
            return document.getElementById('player-select').value.replace(/\/$/, "");
        }

        document.getElementById('search-btn').addEventListener('click', searchVideos);
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchVideos();
        });

        async function searchVideos() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const btn = document.getElementById('search-btn');
            btn.innerText = "Searching..."; // UI update
            
            let data = null;
            let success = false;

            // Auto-Fallback System: Try search servers until one works!
            for (let i = 0; i < searchApis.length; i++) {
                const apiUrl = searchApis[i];
                const url = `${apiUrl}/search?q=${encodeURIComponent(query)}&filter=videos`;
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000); // Give each server 5 secs
                    
                    const response = await fetch(url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) throw new Error("Status " + response.status);
                    
                    data = await response.json();
                    success = true;
                    break; // It worked! Break out of the background loop.
                } catch (error) {
                    console.warn(`Search API ${apiUrl} failed/blocked. Trying next...`);
                }
            }
            
            btn.innerText = "Search"; 
            
            if (!success || !data || !data.items) {
                alert('All search networks are currently busy. Please wait 30 seconds and try again!');
                return;
            }

            displayResults(data.items);
        }

        function displayResults(items) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = ''; 

            // Only grab actual videos, no playlists or channels
            const videos = items.filter(item => item.type === 'stream');

            videos.forEach(video => {
                let videoId = "";
                // Safely grab the YouTube Video ID from the URL string
                if (video.url && video.url.includes("?v=")) {
                    videoId = video.url.split('?v=')[1];
                } else {
                    return; 
                }

                const title = video.title;
                const author = video.uploaderName;
                const thumbUrl = video.thumbnail; // Piped safely proxies the thumbnail for us!
                
                // Make duration look pretty (e.g., "5:03")
                let durationStr = "";
                if (video.duration) {
                    const m = Math.floor(video.duration / 60);
                    let s = video.duration % 60;
                    if (s < 10) s = '0' + s;
                    durationStr = ` • ${m}:${s}`;
                }
                
                const div = document.createElement('div');
                div.className = 'result-item';
                div.onclick = () => playVideo(videoId);

                div.innerHTML = `
                    <img src="${thumbUrl}" alt="Thumbnail" onerror="this.src='https://via.placeholder.com/160x90/2b2b36/FFFFFF?text=No+Image'">
                    <div class="result-item-content">
                        <h3>${title}</h3>
                        <p>${author}${durationStr}</p>
                    </div>
                `;
                resultsContainer.appendChild(div);
            });
        }

        function playVideo(videoId) {
            const playerContainer = document.getElementById('player-container');
            const player = document.getElementById('video-player');
            const playerProxyUrl = getPlayerUrl();
            
            // The video player iframe is immune to CORS rules!
            player.src = `${playerProxyUrl}/embed/${videoId}?autoplay=1`;
            playerContainer.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
