<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Alternative Client</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }
    header { padding:15px; background:#1e293b; display:flex; gap:10px; }
    input { flex:1; padding:10px; border-radius:8px; border:none; }
    button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; }
    #results { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:15px; padding:15px; }
    .card { background:#1e293b; padding:10px; border-radius:10px; }
    img { width:100%; border-radius:8px; }
    .title { font-size:14px; margin-top:5px; }
  </style>
</head>
<body>

<header>
  <input id="search" placeholder="Search videos..." />
  <button onclick="doSearch()">Search</button>
</header>

<div id="results"></div>

<script>
const PROVIDERS = [
  async (q) => {
    const r = await fetch(`https://inv.nadeko.net/api/v1/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    return d.map(v => ({
      title: v.title,
      thumb: v.videoThumbnails?.[0]?.url,
      url: `https://www.youtube.com/watch?v=${v.videoId}`
    }));
  },
  async (q) => {
    const r = await fetch(`https://invidious.fdn.fr/api/v1/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    return d.map(v => ({
      title: v.title,
      thumb: v.videoThumbnails?.[0]?.url,
      url: `https://www.youtube.com/watch?v=${v.videoId}`
    }));
  },
  async (q) => {
    const r = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(q)}&filter=videos`);
    const d = await r.json();
    return d.items.map(v => ({
      title: v.title,
      thumb: v.thumbnail,
      url: `https://www.youtube.com/watch?v=${v.id}`
    }));
  }
];

async function doSearch() {
  const q = document.getElementById('search').value;
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = "Loading...";

  for (const provider of PROVIDERS) {
    try {
      const data = await provider(q);
      render(data);
      return;
    } catch (e) {
      console.log("Provider failed", e);
    }
  }

  resultsEl.innerHTML = "All providers failed. Try again later.";
}

function render(videos) {
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = "";

  videos.slice(0, 20).forEach(v => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <a href="${v.url}" target="_blank">
        <img src="${v.thumb}" />
        <div class="title">${v.title}</div>
      </a>
    `;
    resultsEl.appendChild(div);
  });
}
</script>

</body>
</html>
