<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Unblocked Proxy Viewer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #1e1e24; color: #fff; }
        .container { max-width: 800px; margin: auto; }
        h1 { text-align: center; color: #00d2ff; margin-bottom: 5px; }
        
        #settings-container { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 15px; }
        #settings-container label { font-size: 14px; margin-right: 10px; color: #aaa; }
        #player-select { padding: 8px 12px; border-radius: 5px; background: #2b2b36; color: #00d2ff; border: 1px solid #444; font-size: 14px; cursor: pointer; outline: none; max-width: 280px; }
        #player-select:focus { border-color: #00d2ff; }

        #search-container { display: flex; margin-bottom: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #search-input { flex-grow: 1; padding: 15px; font-size: 16px; border: none; border-radius: 5px 0 0 5px; background: #2b2b36; color: white; }
        #search-input:focus { outline: none; }
        #search-btn { padding: 15px 25px; font-size: 16px; cursor: pointer; border: none; background-color: #00d2ff; color: #1e1e24; border-radius: 0 5px 5px 0; font-weight: bold; transition: background 0.2s; }
        #search-btn:hover { background-color: #00a8cc; }
        
        /* New live status text so you can watch it bypass errors */
        #status-text { text-align: center; color: #888; margin-bottom: 15px; font-size: 13px; min-height: 20px; font-style: italic; }
        
        #player-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; margin-bottom: 20px; display: none; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .result-item { display: flex; margin-bottom: 15px; cursor: pointer; background: #2b2b36; padding: 10px; border-radius: 8px; transition: transform 0.2s, background 0.2s; }
        .result-item:hover { transform: scale(1.02); background: #353542; }
        .result-item img { width: 160px; height: 90px; object-fit: cover; margin-right: 15px; border-radius: 4px; background: #111; }
        .result-item-content h3 { margin: 0 0 5px 0; font-size: 16px; }
        .result-item-content p { margin: 0; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unblocked Video Viewer</h1>
        
        <div id="settings-container">
            <label for="player-select">Video Player Server:</label>
            <select id="player-select">
                <option value="https://inv.tux.pizza">inv.tux.pizza (Europe)</option>
                <option value="https://invidious.flokinet.to">invidious.flokinet.to (Europe)</option>
                <option value="https://iv.melmac.space">iv.melmac.space (Europe)</option>
                <option value="https://yt.artemislena.eu">yt.artemislena.eu (Europe)</option>
                <option value="https://vid.puffyan.us">vid.puffyan.us (US / Global)</option>
                <option value="https://yewtu.be">yewtu.be (Global)</option>
            </select>
        </div>
        
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search for videos...">
            <button id="search-btn">Search</button>
        </div>
        
        <!-- Status indicator for the background loops -->
        <div id="status-text"></div>
        
        <div id="player-container">
            <iframe id="video-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Massive list of BOTH Invidious and Piped Search APIs
        const searchEndpoints =[
            "https://pipedapi.kavin.rocks/search?filter=videos&q=",
            "https://pipedapi.tokhmi.xyz/search?filter=videos&q=",
            "https://inv.tux.pizza/api/v1/search?type=video&q=",
            "https://api.piped.privacydev.net/search?filter=videos&q=",
            "https://vid.puffyan.us/api/v1/search?type=video&q=",
            "https://invidious.nerdvpn.de/api/v1/search?type=video&q=",
            "https://invidious.flokinet.to/api/v1/search?type=video&q="
        ];

        // Public CORS Bypass Proxies (This fixes "CORS Missing Allow Origin" and Cloudflare Blocks!)
        const proxyWrappers =[
            "", // First, try directly
            "https://api.allorigins.win/raw?url=", // If direct fails, wrap in AllOrigins
            "https://api.codetabs.com/v1/proxy?quest=" // If AllOrigins fails, wrap in CodeTabs
        ];

        function getPlayerUrl() {
            return document.getElementById('player-select').value.replace(/\/$/, "");
        }

        document.getElementById('search-btn').addEventListener('click', searchVideos);
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchVideos();
        });

        async function searchVideos() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const btn = document.getElementById('search-btn');
            const statusText = document.getElementById('status-text');
            btn.innerText = "Searching..."; 
            
            let finalResults = null;

            // Loop 1: Go through every API Server
            for (let endpoint of searchEndpoints) {
                const targetUrl = endpoint + encodeURIComponent(query);
                const serverName = new URL(targetUrl).hostname;
                
                // Loop 2: Try Direct, then try wrapping it in CORS proxies
                for (let proxy of proxyWrappers) {
                    let fetchUrl = targetUrl;
                    let proxyName = proxy === "" ? "Direct connection" : `Bypass Proxy (${new URL(proxy).hostname})`;
                    
                    statusText.innerText = `Testing ${serverName} via ${proxyName}...`;
                    
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 seconds max per try
                        
                        const response = await fetch(fetchUrl, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        
                        if (!response.ok) throw new Error("Status " + response.status);
                        
                        const text = await response.text();
                        const data = JSON.parse(text); // If Cloudflare throws an HTML bot check, JSON.parse triggers an error and safely moves to the next server!
                        
                        // We made it! Normalize the data depending on whether it was a Piped or Invidious server
                        let normalized =[];
                        if (Array.isArray(data)) {
                            // Invidious formatting
                            normalized = data.filter(v => v.type === 'video' || v.videoId).map(v => ({
                                id: v.videoId, title: v.title, author: v.author, duration: v.lengthSeconds
                            }));
                        } else if (data.items) {
                            // Piped formatting
                            normalized = data.items.filter(v => v.type === 'stream').map(v => ({
                                id: v.url.split('?v=')[1], title: v.title, author: v.uploaderName, duration: v.duration
                            }));
                        }

                        if (normalized.length > 0) {
                            finalResults = normalized;
                            statusText.innerText = `Connection established via ${serverName} !`;
                            break; // Break out of proxy loop
                        }
                    } catch (error) {
                        // Background failure! Silently loop around and try the next combination
                    }
                }
                if (finalResults) break; // Break out of server loop
            }
            
            btn.innerText = "Search"; 
            
            if (!finalResults) {
                statusText.innerText = "";
                alert('All search networks are currently dead or blocking requests. Please try again later.');
                return;
            }

            displayResults(finalResults);
        }

        function displayResults(videos) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = ''; 
            const playerProxyUrl = getPlayerUrl();

            videos.forEach(video => {
                if (!video.id) return;
                
                // CRITICAL FIX: Piped's own image proxies frequently break.
                // We now force all image thumbnails to route directly through the Player Server you selected in the dropdown!
                const thumbUrl = `${playerProxyUrl}/vi/${video.id}/mqdefault.jpg`;
                
                let durationStr = "";
                if (video.duration) {
                    const m = Math.floor(video.duration / 60);
                    let s = video.duration % 60;
                    if (s < 10) s = '0' + s;
                    durationStr = ` • ${m}:${s}`;
                }
                
                const div = document.createElement('div');
                div.className = 'result-item';
                div.onclick = () => playVideo(video.id);

                div.innerHTML = `
                    <img src="${thumbUrl}" alt="Thumbnail" onerror="this.src='https://via.placeholder.com/160x90/2b2b36/FFFFFF?text=No+Image'">
                    <div class="result-item-content">
                        <h3>${video.title}</h3>
                        <p>${video.author}${durationStr}</p>
                    </div>
                `;
                resultsContainer.appendChild(div);
            });
        }

        function playVideo(videoId) {
            const playerContainer = document.getElementById('player-container');
            const player = document.getElementById('video-player');
            const playerProxyUrl = getPlayerUrl();
            
            // The iframe player bypasses network blocks entirely
            player.src = `${playerProxyUrl}/embed/${videoId}?autoplay=1`;
            playerContainer.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
